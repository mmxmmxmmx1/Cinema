spring.datasource.url=jdbc:h2:mem:cinema_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Tests shouldn't depend on external DB or MySQL-specific migrations.
spring.flyway.enabled=false
spring.sql.init.mode=never

logging.level.root=warn

# Keep controller/integration tests stable while exercising business flows.
app.payment.allow-mode-override=true
app.rate-limit.order-create-per-minute=10000
app.rate-limit.order-pay-per-minute=10000
app.rate-limit.order-cancel-per-minute=10000
app.rate-limit.notification-read-per-minute=10000
