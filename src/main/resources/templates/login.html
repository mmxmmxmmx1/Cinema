<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登入很好睡電影院</title>
    <style>
        body { font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif; margin: 0; background: #101522; color: #f4f6ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-panel { background: rgba(18, 22, 48, 0.94); padding: 48px 56px; border-radius: 28px; box-shadow: 0 24px 60px rgba(3, 6, 20, 0.65); width: min(420px, 92%); display: grid; gap: 28px; }
        h1 { margin: 0; font-size: 28px; letter-spacing: 1px; text-align: center; }
        p { margin: 0; color: #b9bedb; text-align: center; line-height: 1.6; }
        form { display: grid; gap: 20px; }
        label { display: grid; gap: 8px; font-size: 14px; }
        input { padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.14); background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 16px; outline: none; transition: border 0.2s ease, background 0.2s ease; }
        input:focus { border-color: #6da4ff; background: rgba(109, 164, 255, 0.12); }
        button { padding: 14px 0; border: none; border-radius: 16px; background: linear-gradient(135deg, #4f8cff, #7aa6ff); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, filter 0.2s ease; }
        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .error { background: rgba(255, 107, 107, 0.18); border: 1px solid rgba(255, 107, 107, 0.6); padding: 12px 16px; border-radius: 14px; color: #ffd7d7; font-size: 14px; text-align: center; }
        .lock-countdown { margin-top: 8px; font-size: 13px; color: #ffeaea; display: flex; justify-content: center; gap: 6px; align-items: center; }
        .lock-countdown span { font-weight: 600; }
        .target-hint { background: rgba(109, 164, 255, 0.12); border: 1px solid rgba(109, 164, 255, 0.4); padding: 12px 16px; border-radius: 14px; color: #d6e6ff; font-size: 14px; text-align: center; }
        .back-home { text-align: center; font-size: 14px; }
        .back-home a { color: #8ec7ff; text-decoration: none; }
        .back-home a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-panel">
    <div>
        <h1>很好睡電影院登入</h1>
        <p>使用同一組帳號即可進入會員、員工、管理與 IT 各專區。</p>
    </div>

    <div th:if="${targetLabel}" class="target-hint">
        <span th:text="'您即將登入 ' + ${targetLabel} + ' 區域。'">您即將登入 指定 區域。</span>
    </div>

    <div th:if="${error}" class="error" th:attr="data-lock=${lockSeconds}">
        <span th:text="${error}">帳號或密碼錯誤，請再試一次。</span>
        <div class="lock-countdown" th:if="${lockSeconds}">
            鎖定倒數：<span class="countdown-value">--:--</span>
        </div>
    </div>

    <form method="post" action="/login">`n        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input th:if="${target}" type="hidden" name="target" th:value="${target}">
        <label>
            帳號
            <input type="text" name="username" placeholder="輸入帳號" autocomplete="username" required>
        </label>
        <label>
            密碼
            <input type="password" name="password" placeholder="輸入密碼" autocomplete="current-password" required>
        </label>
        <button type="submit">登入</button>
    </form>

    <div class="back-home"><a href="/">← 回到首頁</a></div>
</div>
<script th:if="${lockSeconds}">
    (function() {
        const container = document.querySelector('.error[data-lock]');
        if (!container) return;
        let seconds = parseInt(container.getAttribute('data-lock'), 10);
        if (Number.isNaN(seconds)) return;
        const valueEl = container.querySelector('.countdown-value');

        function format(sec) {
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            return m + ':' + s;
        }

        let intervalId;

        function tick() {
            if (seconds <= 0) {
                valueEl.textContent = '00:00';
                if (intervalId) {
                    clearInterval(intervalId);
                }
                setTimeout(function() { window.location.reload(); }, 1000);
                return;
            }
            valueEl.textContent = format(seconds);
            seconds -= 1;
        }

        tick();
        intervalId = setInterval(tick, 1000);
    })();
</script>
</body>
</html>
