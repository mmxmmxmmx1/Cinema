<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>很好睡電影院會員登入</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page auth-member-login">
<div class="login-panel">
    <div>
        <h1>很好睡電影院</h1>
        <p>請登入會員帳號,即可查看專屬紅利與訂票資訊。</p>
    </div>

    <div th:if="${error}" class="error" th:attr="data-lock=${lockSeconds}">
        <span th:text="${error}">帳號或密碼不正確,請再試一次。</span>
        <div class="countdown-line" th:if="${lockSeconds}">
            剩餘時間：<span class="countdown-value">--:--</span>
        </div>
    </div>

	    <form method="post" action="/member/login">
	        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
	        <th:block th:if="${returnTo}">
	            <input type="hidden" name="returnTo" th:value="${returnTo}">
	        </th:block>
	        <label>
	            會員帳號
	            <input type="text" name="username" placeholder="輸入帳號" autocomplete="username" required>
	        </label>
        <label>
            會員密碼
            <input type="password" name="password" placeholder="輸入密碼" autocomplete="current-password" required>
        </label>
        <button type="submit">登入</button>
    </form>

    <div class="back-home"><a href="/member/password/forgot">忘記密碼 / 重設密碼</a></div>
    <div class="back-home"><a href="/">← 回到首頁</a></div>
</div>
<script defer src="/js/modules/legacy-pages.js?v=20260219-02"></script>
</body>
</html>
