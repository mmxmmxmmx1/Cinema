<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">會員專屬頁面</title>
    <style>
        body { font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif; margin: 0; background: #101223; color: #f4f4f8; }
        header { padding: 32px 48px; background: linear-gradient(135deg, #1f2240, #2f335d); box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4); }
        h1 { margin: 0; font-size: 28px; }
        main { padding: 40px 48px; display: grid; gap: 24px; }
        section { background: rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 24px; backdrop-filter: blur(6px); }
        a { color: #9ad0ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .actions { display: flex; gap: 16px; flex-wrap: wrap; }
        .card { background: rgba(13, 19, 43, 0.6); padding: 20px; border-radius: 14px; }
        button { background: #3b7ddd; color: #fff; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; }
        button:hover { background: #5390ff; }
        .logout-form { display: inline; }
    </style>
</head>
<body>
<header>
    <h1 th:text="${title}">很好睡電影院會員專區</h1>
    <p th:text="${message}">歡迎回來！查看您的專屬優惠與即將到來的電影體驗。</p>
</header>
<main>
    <section class="card">
        <h2>紅利點數</h2>
        <p>目前累積：<strong>12,450 點</strong></p>
        <div class="actions">
            <button type="button">兌換專屬禮遇</button>
            <button type="button">查看點數紀錄</button>
        </div>
    </section>
    <section class="card">
        <h2>即將欣賞的電影</h2>
        <ul>
            <li>沙丘：第二部 — 12/08 18:40 — 1 號廳</li>
            <li>奧本海默 — 12/12 20:10 — 2 號廳</li>
        </ul>
    </section>
    <form class="logout-form" method="post" action="/member/logout">
        <button type="submit">登出會員</button>
    </form>
    <form id="member-auto-logout" method="post" action="/member/logout" style="display: none;"></form>
    <a href="/">← 返回首頁</a>
</main>
<script>
    (function() {
        const logoutForm = document.getElementById('member-auto-logout');
        if (!logoutForm) return;

        const INACTIVITY_LIMIT = 10 * 60 * 1000;
        const HEARTBEAT_INTERVAL = 60 * 1000;
        const events = ['click', 'mousemove', 'keydown', 'scroll', 'touchstart', 'touchmove'];
        let triggered = false;
        let lastHeartbeat = Date.now();
        let timer = setTimeout(triggerLogout, INACTIVITY_LIMIT);

        function resetTimer() {
            if (triggered) return;
            clearTimeout(timer);
            timer = setTimeout(triggerLogout, INACTIVITY_LIMIT);
            sendHeartbeat();
        }

        function triggerLogout() {
            if (triggered) return;
            triggered = true;
            logoutForm.submit();
        }

        function sendHeartbeat() {
            const now = Date.now();
            if (now - lastHeartbeat < HEARTBEAT_INTERVAL) {
                return;
            }
            lastHeartbeat = now;
            if (navigator.sendBeacon) {
                try {
                    navigator.sendBeacon('/member/activity', new Blob([], { type: 'text/plain' }));
                    return;
                } catch (err) {
                    // ignore and fall through
                }
            }
            fetch('/member/activity', { method: 'POST', keepalive: true }).catch(function() {});
        }

        events.forEach(function(evt) {
            document.addEventListener(evt, resetTimer, { passive: true });
        });

        sendHeartbeat();
    })();
</script>
</body>
</html>
