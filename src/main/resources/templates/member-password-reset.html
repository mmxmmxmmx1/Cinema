<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員重設密碼</title>
    <style>
        body { font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif; margin: 0; background: #0f1426; color: #f4f6ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .panel { background: rgba(18, 22, 48, 0.88); padding: 44px 50px; border-radius: 24px; width: min(500px, 92%); box-shadow: 0 24px 60px rgba(3, 6, 20, 0.65); display: grid; gap: 18px; }
        h1 { margin: 0; font-size: 28px; }
        p { margin: 0; color: #b9bedb; line-height: 1.6; }
        label { display: grid; gap: 8px; font-size: 14px; }
        input { padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.16); background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #6da4ff; background: rgba(109, 164, 255, 0.12); }
        button { padding: 14px 0; border: none; border-radius: 14px; background: linear-gradient(135deg, #4f8cff, #7aa6ff); color: #fff; font-size: 16px; cursor: pointer; }
        .msg-ok { color: #ccffe5; background: rgba(88, 255, 161, 0.16); border: 1px solid rgba(88, 255, 161, 0.35); border-radius: 12px; padding: 10px 12px; }
        .msg-err { color: #ffd7d7; background: rgba(255, 107, 107, 0.18); border: 1px solid rgba(255, 107, 107, 0.6); border-radius: 12px; padding: 10px 12px; }
        .demo-token { color: #e6f0ff; background: rgba(90, 130, 255, 0.16); border: 1px solid rgba(90, 130, 255, 0.45); border-radius: 12px; padding: 10px 12px; }
        code { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
        a { color: #8ec7ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="panel">
    <h1>重設會員密碼</h1>
    <p>輸入帳號、重設碼與新密碼（至少 6 碼，需同時包含英文與數字）。</p>

    <div th:if="${success}" class="msg-ok" th:text="${success}">密碼重設成功</div>
    <div th:if="${error}" class="msg-err" th:text="${error}">密碼重設失敗</div>
    <div th:if="${demoToken}" class="demo-token">
        測試重設碼：<code th:text="${demoToken}">ABC1234567</code>
    </div>

    <form method="post" action="/member/password/reset">
        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>
            會員帳號
            <input type="text" name="username" th:value="${username}" required>
        </label>
        <label>
            重設碼（15 分鐘內有效）
            <input type="text" name="token" th:value="${token}" autocomplete="one-time-code" required>
        </label>
        <label>
            新密碼
            <input type="password" name="newPassword" minlength="6" maxlength="100" pattern="(?=.*[A-Za-z])(?=.*\\d).{6,100}" required>
        </label>
        <label>
            確認新密碼
            <input type="password" name="confirmPassword" minlength="6" maxlength="100" pattern="(?=.*[A-Za-z])(?=.*\\d).{6,100}" required>
        </label>
        <button type="submit">重設密碼</button>
    </form>

    <div>
        <a href="/member/password/forgot">沒有重設碼？先建立重設碼</a>
    </div>
    <div>
        <a href="/member/login">← 回會員登入</a>
    </div>
</div>
</body>
</html>
