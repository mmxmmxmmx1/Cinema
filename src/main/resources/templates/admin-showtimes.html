<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">場次管理</title>
    <style>
        body { font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif; margin: 0; background: #0f1424; color: #f8f9ff; }
        header { padding: 28px 36px; background: linear-gradient(135deg, #24325f, #1a2342); }
        main { max-width: 1400px; margin: 0 auto; padding: 24px 36px; display: grid; gap: 16px; }
        section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; }
        label { display: block; margin: 8px 0 6px; color: #d7e5ff; }
        input, select { width: 100%; max-width: 260px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; padding: 8px 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; vertical-align: middle; }
        th { color: #9ad0ff; }
        .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
        .row input, .row select { max-width: 200px; }
        button { background: #3b7ddd; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
        .danger { background: #ba4a4a; }
        .ok { color: #b9ffda; }
        .err { color: #ffb1b1; }
        a { color: #8ec7ff; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <h1 th:text="${title}">場次管理</h1>
    <p>管理員可新增、調整、停用場次（showtime override）。</p>
</header>
<main>
    <section th:if="${success}" class="ok" th:text="${success}">更新成功</section>
    <section th:if="${error}" class="err" th:text="${error}">更新失敗</section>

    <section>
        <form method="get" action="/employee/admin/showtimes">
            <label for="movieId">選擇電影</label>
            <select id="movieId" name="movieId" onchange="this.form.submit()">
                <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}" th:selected="${m.id == selectedMovieId}">電影</option>
            </select>
        </form>
    </section>

    <section>
        <h2 style="margin-top:0;">新增/更新場次</h2>
        <form method="post" action="/employee/admin/showtimes/save">
            <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : '_csrf'}" th:value="${_csrf != null ? _csrf.token : ''}">
            <input type="hidden" name="movieId" th:value="${selectedMovieId}">
            <div class="row">
                <div>
                    <label for="showtimeId">場次ID</label>
                    <input id="showtimeId" name="showtimeId" maxlength="50" placeholder="例如 mv-02-st1">
                </div>
                <div>
                    <label for="startTime">開演時間</label>
                    <input id="startTime" name="startTime" maxlength="5" placeholder="08:50">
                </div>
                <div>
                    <label for="durationMinutes">片長(分鐘)</label>
                    <input id="durationMinutes" name="durationMinutes" type="number" min="30" max="400" value="120">
                </div>
                <div>
                    <label for="auditorium">影廳</label>
                    <input id="auditorium" name="auditorium" maxlength="100" placeholder="1號廳">
                </div>
                <div>
                    <button type="submit">儲存場次</button>
                </div>
            </div>
        </form>
    </section>

    <section>
        <h2 style="margin-top:0;">目前場次</h2>
        <div th:if="${showtimes == null || #lists.isEmpty(showtimes)}">目前沒有場次。</div>
        <table th:if="${showtimes != null && !#lists.isEmpty(showtimes)}">
            <thead>
            <tr>
                <th>場次ID</th>
                <th>時間</th>
                <th>片長</th>
                <th>影廳</th>
                <th>動作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${showtimes}">
                <td th:text="${s.id}">mv-02-st1</td>
                <td th:text="${s.startTime}">08:50</td>
                <td th:text="${s.durationMinutes + ' 分'}">120 分</td>
                <td th:text="${s.auditorium}">1號廳</td>
                <td>
                    <form method="post" action="/employee/admin/showtimes/disable">
                        <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : '_csrf'}" th:value="${_csrf != null ? _csrf.token : ''}">
                        <input type="hidden" name="movieId" th:value="${selectedMovieId}">
                        <input type="hidden" name="showtimeId" th:value="${s.id}">
                        <button type="submit" class="danger">停用</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <section>
        <a href="/employee/admin/dashboard">← 回管理首頁</a>
    </section>
</main>
</body>
</html>
