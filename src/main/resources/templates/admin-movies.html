<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">電影資料管理</title>
    <style>
        body { font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif; margin: 0; background: #0f1424; color: #f8f9ff; }
        header { padding: 28px 36px; background: linear-gradient(135deg, #24325f, #1a2342); }
        main { max-width: 1400px; margin: 0 auto; padding: 24px 36px; display: grid; gap: 16px; }
        section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; }
        label { display: block; margin: 8px 0 6px; color: #d7e5ff; }
        input, textarea { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; padding: 8px 10px; }
        textarea { min-height: 96px; resize: vertical; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; vertical-align: middle; }
        th { color: #9ad0ff; }
        .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px; }
        button { background: #3b7ddd; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
        button.secondary { background: #41527e; }
        button.danger { background: #ba4a4a; }
        a { color: #8ec7ff; text-decoration: none; }
        .ok { color: #b9ffda; }
        .err { color: #ffb1b1; }
        .movie-id-link { color: #8ec7ff; }
    </style>
</head>
<body>
<header>
    <h1 th:text="${title}">電影資料管理</h1>
    <p>管理電影基本資料、海報、輪播圖與啟用狀態。</p>
</header>
<main>
    <section th:if="${success}" class="ok" th:text="${success}">更新成功</section>
    <section th:if="${error}" class="err" th:text="${error}">更新失敗</section>

    <section>
        <h2>電影清單</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>片名</th>
                <th>排序</th>
                <th>狀態</th>
                <th>動作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="movie : ${movies}">
                <td>
                    <a class="movie-id-link" th:href="@{/employee/admin/movies(movieId=${movie.id})}" th:text="${movie.id}">mv-01</a>
                </td>
                <td th:text="${movie.title}">貓砂:第二部</td>
                <td th:text="${movie.sortOrder}">10</td>
                <td th:text="${movie.enabled ? '啟用中' : '已停用'}">啟用中</td>
                <td>
                    <form method="post" action="/employee/admin/movies/toggle">
                        <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : '_csrf'}" th:value="${_csrf != null ? _csrf.token : ''}">
                        <input type="hidden" name="movieId" th:value="${movie.id}">
                        <input type="hidden" name="enabled" th:value="${movie.enabled ? 'false' : 'true'}">
                        <button type="submit" th:classappend="${movie.enabled ? ' danger' : ' secondary'}"
                                th:text="${movie.enabled ? '停用' : '啟用'}">停用</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${movies == null || #lists.isEmpty(movies)}">
                <td colspan="5">目前沒有電影資料。</td>
            </tr>
            </tbody>
        </table>
    </section>

    <section>
        <h2>新增 / 編輯電影</h2>
        <form method="post" action="/employee/admin/movies/save">
            <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : '_csrf'}" th:value="${_csrf != null ? _csrf.token : ''}">
            <div class="row">
                <div>
                    <label for="movieId">電影 ID</label>
                    <input id="movieId" name="movieId" maxlength="50" th:value="${selectedMovie != null ? selectedMovie.id : ''}" placeholder="例如 mv-11" required>
                </div>
                <div>
                    <label for="title">電影名稱</label>
                    <input id="title" name="title" maxlength="120" th:value="${selectedMovie != null ? selectedMovie.title : ''}" required>
                </div>
                <div>
                    <label for="subtitle">副標題</label>
                    <input id="subtitle" name="subtitle" maxlength="120" th:value="${selectedMovie != null ? selectedMovie.subtitle : ''}">
                </div>
                <div>
                    <label for="sortOrder">排序值</label>
                    <input id="sortOrder" name="sortOrder" type="number" min="0" max="10000" th:value="${selectedMovie != null ? selectedMovie.sortOrder : 0}">
                </div>
            </div>
            <div class="row">
                <div>
                    <label for="posterUrl">主海報網址</label>
                    <input id="posterUrl" name="posterUrl" maxlength="500" th:value="${selectedMovie != null ? selectedMovie.posterUrl : ''}" placeholder="https://... 或 /images/...">
                </div>
                <div>
                    <label for="carouselImageUrl">輪播圖片網址</label>
                    <input id="carouselImageUrl" name="carouselImageUrl" maxlength="500" th:value="${selectedMovie != null ? selectedMovie.carouselImageUrl : ''}" placeholder="https://... 或 /images/...">
                </div>
            </div>
            <label for="description">簡介</label>
            <textarea id="description" name="description" maxlength="1000" th:text="${selectedMovie != null ? selectedMovie.description : ''}"></textarea>

            <div class="actions">
                <label>
                    <input type="checkbox" name="enabled" value="true" th:checked="${selectedMovie == null || selectedMovie.enabled}">
                    上架啟用
                </label>
                <button type="submit">儲存電影資料</button>
            </div>
        </form>
    </section>

    <section>
        <a href="/employee/admin/dashboard">← 回管理首頁</a>
    </section>
</main>
<script defer src="/js/modules/legacy-pages.js?v=20260219-02"></script>
</body>
</html>
