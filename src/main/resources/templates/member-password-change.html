<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員修改密碼</title>
    <link rel="stylesheet" href="/css/member-area.css">
</head>
<body class="member-area">
<header class="member-header">
    <h1>修改會員密碼</h1>
    <p class="member-subtitle">登入後可直接更新密碼，更新成功後請重新登入。密碼至少 6 碼且需同時包含英文與數字。</p>
</header>
<main class="member-main">
    <section class="member-card" th:if="${success}">
        <div class="member-success-text" th:text="${success}">密碼更新成功</div>
    </section>
    <section class="member-card" th:if="${error}">
        <div class="member-error-text" th:text="${error}">密碼更新失敗</div>
    </section>

    <section class="member-card">
        <form method="post" action="/member/password/change" class="member-form-grid">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                目前密碼
                <input type="password" name="currentPassword" required class="member-input-full">
            </label>
            <label>
                新密碼
                <input type="password" name="newPassword" minlength="6" maxlength="100" pattern="(?=.*[A-Za-z])(?=.*\\d).{6,100}" required class="member-input-full">
            </label>
            <label>
                確認新密碼
                <input type="password" name="confirmPassword" minlength="6" maxlength="100" pattern="(?=.*[A-Za-z])(?=.*\\d).{6,100}" required class="member-input-full">
            </label>
            <button class="member-btn" type="submit">更新密碼</button>
        </form>
    </section>

    <section class="member-card">
        <a href="/member">← 回會員專區</a>
    </section>
</main>
</body>
</html>
