<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>點數紀錄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/member-area.css">
</head>
<body class="member-area">
<header class="member-header">
    <h1>點數紀錄</h1>
    <p class="member-subtitle">最近的點數累積明細</p>
</header>
<main class="member-main">
    <div th:if="${success}" class="member-flash" th:text="${success}" style="background: rgba(88, 255, 161, 0.16); border: 1px solid rgba(88, 255, 161, 0.35); color: #ccffe5;">兌換成功</div>
    <div th:if="${error}" class="member-flash error" th:text="${error}">兌換失敗</div>

    <section class="member-card">
        <h2>目前可用點數</h2>
        <p><strong th:text="${#numbers.formatInteger(points, 1, 'COMMA')} + ' 點'">0 點</strong></p>
    </section>

    <section class="member-card">
        <h2>點數兌換</h2>
        <div class="member-meta" th:if="${rewardOptions == null || #lists.isEmpty(rewardOptions)}">目前沒有可兌換項目</div>
        <form method="post" action="/member/points/redeem" th:if="${rewardOptions != null && !#lists.isEmpty(rewardOptions)}">
            <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : '_csrf'}" th:value="${_csrf != null ? _csrf.token : ''}">
            <label for="rewardCode">選擇項目</label>
            <select id="rewardCode" name="rewardCode">
                <option th:each="r : ${rewardOptions}" th:value="${r.code}" th:text="${r.name + '（' + r.pointsCost + ' 點）'}">小爆米花兌換券（50 點）</option>
            </select>
            <div style="margin-top:12px;">
                <button type="submit" class="member-btn">確認兌換</button>
            </div>
        </form>
    </section>

    <section class="member-card">
        <h2>最近回饋</h2>
        <div class="member-meta" th:if="${logs == null || #lists.isEmpty(logs)}">目前沒有點數紀錄</div>
        <ul th:if="${logs != null && !#lists.isEmpty(logs)}">
            <li th:each="log : ${logs}">
                <strong th:text="${log.description}">訂單 #1 付款回饋</strong>
                <span th:text="${' · ' + (log.points > 0 ? '+' : '') + log.points + ' 點'}">+120 點</span>
                <span th:text="${' · 金額 $' + log.amount}">金額 $1200</span>
                <div class="member-meta" th:text="${log.paidAt}">2026-02-11 20:10</div>
            </li>
        </ul>
    </section>

    <section class="member-card">
        <a href="/member">← 回會員專區</a>
        <span style="margin-left: 12px;"></span>
        <a href="/">回到購票首頁</a>
    </section>
</main>
</body>
</html>
