<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">管理後台</title>
    <style>
        body { font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif; margin: 0; background: #10152a; color: #f8f9ff; }
        header { padding: 32px 48px; background: linear-gradient(135deg, #2d3c68, #1c2642); box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45); }
        h1 { margin: 0; font-size: 28px; }
        main { padding: 40px 48px; display: grid; gap: 22px; }
        section { background: rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(6px); }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .metric-card { background: rgba(17, 25, 52, 0.6); padding: 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .metric-card h3 { margin: 0 0 8px 0; font-size: 16px; color: #9ad0ff; }
        .metric-card p { margin: 0; font-size: 28px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 10px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); text-align: left; }
        th { color: #9ad0ff; font-weight: 600; }
        a { color: #8ec7ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { background: #3b7ddd; color: #fff; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; margin-top: 12px; }
        button:hover { background: #5390ff; }
        .logout { display: inline-block; margin-top: 12px; }
    </style>
</head>
<body>
<header>
    <h1 th:text="${title}">很好睡電影院管理中心</h1>
    <p th:text="${message}">檢視營運指標、角色權限與系統公告。</p>
</header>
<main>
    <section>
        <h2>今日重點指標</h2>
        <div class="metric-grid">
            <div class="metric-card">
                <h3>總銷售額</h3>
                <p th:text="${'NT$ ' + (adminMetrics != null ? #numbers.formatInteger(adminMetrics.todayRevenue, 1, 'COMMA') : '0')}">NT$ 0</p>
            </div>
            <div class="metric-card">
                <h3>累計觀影人次</h3>
                <p th:text="${adminMetrics != null ? #numbers.formatInteger(adminMetrics.todayAudience, 1, 'COMMA') : '0'}">0</p>
            </div>
            <div class="metric-card">
                <h3>當日退票</h3>
                <p th:text="${adminMetrics != null ? adminMetrics.todayCancel : 0}">0</p>
            </div>
            <div class="metric-card">
                <h3>7 日內角色異動</h3>
                <p th:text="${adminMetrics != null ? adminMetrics.roleChanges7d : 0}">0</p>
            </div>
        </div>
    </section>
    <section>
        <h2>角色權限檢視</h2>
        <table>
            <thead>
            <tr>
                <th>角色</th>
                <th>含意</th>
                <th>人數</th>
                <th>最近異動</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${adminMetrics != null && adminMetrics.roleSummary != null}" th:each="r : ${adminMetrics.roleSummary}">
                <td th:text="${r.role_code}">ADMIN</td>
                <td th:text="${r.role_name}">管理者</td>
                <td th:text="${r.member_count}">0</td>
                <td>即時統計</td>
            </tr>
            <tr th:if="${adminMetrics == null || adminMetrics.roleSummary == null || #lists.isEmpty(adminMetrics.roleSummary)}">
                <td colspan="4">目前沒有角色統計資料</td>
            </tr>
            </tbody>
        </table>
    </section>
    <section>
        <h2>系統公告</h2>
        <ul>
            <li>23:00 - 02:00 進行票務系統維護，請提前通知顧客。</li>
            <li>新員工教育訓練簡報已上傳至知識庫。</li>
        </ul>
    </section>
    <section>
        <h2>快速管理</h2>
        <ul>
            <li><a href="/employee/admin/roles">角色管理（demo）</a></li>
            <li><a href="/employee/admin/showtimes">場次管理（新增/停用）</a></li>
            <li><a href="/employee/admin/audit">稽核監控（最近 24 小時）</a></li>
            <li>
                <a href="/employee/admin/tools">維護工具（清理過期資料）</a>
                <span th:if="${cleanupSnapshot != null}" th:text="${' · 待清理：逾時訂單 ' + cleanupSnapshot.expiredPendingOrders + ' 筆，過期通知 ' + cleanupSnapshot.expiredNotifications + ' 筆'}"></span>
            </li>
        </ul>
    </section>
    <form class="logout" method="post" action="/employee/logout">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">登出管理者帳號</button>
    </form>
    <form id="admin-auto-logout" method="post" action="/employee/logout" hidden>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>
    <a href="/">← 回首頁</a>
</main>
<script defer src="/js/modules/legacy-pages.js?v=20260219-02"></script>
</body>
</html>
