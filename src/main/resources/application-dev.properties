spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cinema?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&useUnicode=true&characterEncoding=utf8}
# Security hardening: do not commit reusable dev credentials.
# Set DB_USERNAME / DB_PASSWORD from your local environment when needed.
# Fallback values avoid unresolved placeholder literals (e.g. '${DB_USERNAME}')
# when IDE run configurations start from a different working directory.
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# Keep business time calculations deterministic in local dev.
app.time-zone=${APP_TIME_ZONE:Asia/Taipei}

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.devtools.restart.enabled=true

spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/dev-migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# Internal mock workflow switches (no external payment/email/sms dependency).
app.payment.provider=mock
app.payment.allow-mode-override=true
app.notification.provider=inapp
app.notification.retention-days=30
app.notification.cleanup-ms=3600000
app.order.pending-timeout-minutes=15
app.order.expire-check-ms=60000
app.rate-limit.order-create-per-minute=30
app.rate-limit.order-pay-per-minute=40
app.rate-limit.order-cancel-per-minute=30
app.rate-limit.notification-read-per-minute=80
app.rate-limit.cleanup-ms=300000

# CSRF cookie policy for local HTTP development.
app.security.csrf-cookie-secure=false
app.security.csrf-cookie-same-site=Lax
