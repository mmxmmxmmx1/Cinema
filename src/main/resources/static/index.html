п»ҝ<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>еҫҲеҘҪзқЎйӣ»еҪұйҷў</title>
    <!--
      Use absolute paths for static assets.  When Vue Router is configured with HTML5 history mode,
      reloading a deep-linked URL (e.g. "/movies/123") causes the browser to request the same path
      from the server.  Spring Boot is configured to always return this index page for unknown
      resources.  However, relative paths like "css/styles.css" or "js/app.js" will then be resolved
      relative to the current URL (e.g. "/movies/123/css/styles.css"), which does not exist.
      This results in the CSS/JS failing to load and the page appearing blank (a black screen) on a
      hard reload (Ctrl + Shift + R).  Prefixing the paths with a leading slash makes them absolute
      and ensures they are resolved from the root of the application regardless of the current
      location.
    -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ?оёҒ??жҒҚоІ„йҠқйӨғжҚҶ??*/
#splash-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
  opacity: 1;
  visibility: visible;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}

/* ?оёҒ??жҒҚоІ„зҳӣвҲӘпҠҫ?пҺҮ? */
#splash-screen.fade-out {
  opacity: 0;
  visibility: hidden;
}

/* ?жү№жҚҶж‘°еӯөоЁ– */
.splash-content {
  text-align: center;
  animation: fadeInUp 1.2s ease-out;
}

/* ?йӨғи”Ј?пј·?иқ”?*/
.cinema-title {
  font-size: 3.5rem;
  color: #fff;
  font-weight: 700;
  margin: 0 0 2rem 0;
  letter-spacing: 0.1em;
  animation: titleGlow 2s ease-in-out infinite alternate;
  font-family: 'Noto Sans TC', sans-serif;
}

/* з’…о©–? */
.tagline {
  font-size: 1.2rem;
  color: #b8b8b8;
  margin-top: 2rem;
  animation: fadeIn 1.5s ease-in 0.5s both;
  font-family: 'Noto Sans TC', sans-serif;
}

/* й ӣпҗЈп…Ҝ?оҹЎоһҘж‘°еӯөоЁ– */
.spinner-wrapper {
  margin: 2rem auto;
}

/* ?п• ?й ӣпҗЈп…Ҝ?оЎҫе…§ */
.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255, 255, 255, 0.1);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}

/* ?о°®пҷ§ж’ҹВҖ?оҹЎоһҘеҡ—о«ұ?й §?*/
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ?о°®пҷ§ж’ҹВҖ?оҹЎоһҘеҡ—о«ұжҘҡ?дәҷ?йҠқ?*/
@keyframes fadeInUp {
  0% {
    opacity: 0;
    transform: translateY(30px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ?о°®пҷ§ж’ҹВҖ?оҹЎоһҘеҡ—о«ұжҘҡ??*/
@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* ?о°®пҷ§ж’ҹВҖ?оҹЎоһҘеҡ—о«ІоЁӘ?пҗӨ???*/
@keyframes titleGlow {
  0% {
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3),
                 0 0 20px rgba(255, 255, 255, 0.2);
  }
  100% {
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                 0 0 30px rgba(255, 255, 255, 0.3),
                 0 0 40px rgba(255, 255, 255, 0.2);
  }
}

/* йҠқйӨғп…ұж‘°еӯө?жҶӘп•ЎоӘј??*/
#root {
  opacity: 0;
  transition: opacity 0.6s ease-in;
}

#root.show {
  opacity: 1;
}

/* ?иёө?ж’ҳоҗҙиә«й–®?*/
@media (max-width: 768px) {
  .cinema-title {
    font-size: 2.5rem;
  }
  
  .tagline {
    font-size: 1rem;
  }
}

@media (max-width: 480px) {
  .cinema-title {
    font-size: 2rem;
  }
  
  .tagline {
    font-size: 0.9rem;
  }
}
</style>

</head>
<body>
  
<!-- ?оёҒ??жҒҚоІ„еҡ—пҺҮж’“?и„Ј?ж“җоўҖ?еҡ—?-->
<div id="splash-screen">
  <div class="splash-content">
    <h1 class="cinema-title">еҫҲеҘҪзқЎйӣ»еҪұйҷў</h1>
    <div class="spinner-wrapper">
      <div class="spinner"></div>
    </div>
    <p class="tagline">жҜҸеҖӢйЎ§е®ўйғҪеҸҜд»ҘзқЎеҫ—еҫҲе®үз©©</p>
  </div>
</div>

<!-- йҠқйӨү??пҗҘоң…?жү№жҚҶ -->
<div id="root"></div>

<!-- Vue.js ??Vue Router -->
<script src="https://unpkg.com/vue@3.3.4/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4.2.4/dist/vue-router.global.js"></script>

<!-- ?оёҒ??жҒҚоІ„?жү№пҚ—?е–®оҜұ -->
<script>
(function(){
  // ?оёҒ??жҒҚоІ„?жү№пҚ—?оҗҙж‘©
  document.addEventListener('DOMContentLoaded', function() {
    const splashScreen = document.getElementById('splash-screen');
    const appContent = document.getElementById('root');
    
    // й–®еү–??оёҒ??жҒҚоІ„жҶҝиҲҗе…§?оҝң?еҡ—?.5иқҳоҳ’?
    setTimeout(function() {
      // зҳӣйӨғ?зҳӣвҲӘпҠҫжҶҝоөӨпҚҶ
      splashScreen.classList.add('fade-out');
      
      // иқ‘пҗЈ?зҳӣвҲӘпҠҫ?оҹЎоһҘж‘°п—»?ж•әп—ҫпјҠиқ·з®”иң“?жү№жҚҶ
      setTimeout(function() {
        splashScreen.style.display = 'none';
        appContent.classList.add('show');
      }, 800); // ?пү©SS transition?оҝң??и©Ё?
      
    }, 2500);
  });
})();
</script>

<!-- йҠқйӨү??пҗҘоң…иқ”п•қ? -->
<script src="/js/app.js"></script>

</body>
