spring.application.name=cinema

spring.datasource.url=jdbc:mysql://localhost:3306/cinema?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&useUnicode=true&characterEncoding=utf8
spring.datasource.username=
spring.datasource.password=

# Disable UserDetailsService auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Hibernate/JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Turn off the Spring boot banner
spring.main.banner-mode=off

# Static resources location
spring.web.resources.static-locations=classpath:/static/

# Cache control (can be disabled during development)
spring.web.resources.cache.period=0

# Server port
server.port=8080

# Reduce logging level. Set logging to warn
logging.level.root=warn

spring.thymeleaf.cache=false
spring.mvc.view.prefix=classpath:/templates/
spring.devtools.restart.enabled=true

spring.profiles.active=dev
