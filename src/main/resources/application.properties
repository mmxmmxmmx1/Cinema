spring.application.name=cinema

spring.datasource.url=jdbc:mysql://localhost:3306/cinema?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=
spring.datasource.password=

#Turn off the Spring boot banner
spring.main.banner-mode=off

# 靜態資源位置
spring.web.resources.static-locations=classpath:/static/

# 快取控制（開發時可關閉）
spring.web.resources.cache.period=0

# 伺服器埠號
server.port=8080


# Reduce logging level. Set logging to warn
logging.level.root=warn

spring.thymeleaf.cache=false
spring.mvc.view.prefix=classpath:/templates/
spring.mvc.view.suffix=.html
spring.devtools.restart.enabled=true

spring.profiles.active=dev
