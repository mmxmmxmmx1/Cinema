spring.application.name=cinema

# Default to dev for local development. In production, set SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# Load local environment overrides from project root if present.
spring.config.import=optional:file:.env[.properties]

# DataSource (required in prod). Dev profile provides local defaults.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Disable UserDetailsService auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Turn off the Spring boot banner
spring.main.banner-mode=off

# Static resources location
spring.web.resources.static-locations=classpath:/static/,classpath:/META-INF/resources/

# Server port
server.port=8080

# Canonical business timezone for booking/order/session flows.
app.time-zone=${APP_TIME_ZONE:Asia/Taipei}
# Keep JSON serialization/deserialization timezone consistent with business rules.
spring.jackson.time-zone=${app.time-zone}

# Unified idle logout rule across the whole site (member/employee and protected APIs).
server.servlet.session.timeout=10m

# Don't trust forwarded headers by default (prevents spoofing). Enable only behind a trusted reverse proxy.
server.forward-headers-strategy=none

# Reduce logging level. Set logging to warn
logging.level.root=warn

spring.mvc.view.prefix=classpath:/templates/
