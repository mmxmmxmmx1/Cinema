spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.thymeleaf.cache=true
spring.web.resources.cache.period=365d
spring.devtools.restart.enabled=false

# Canonical business timezone for all runtime date/time rules.
app.time-zone=${APP_TIME_ZONE:Asia/Taipei}

# Keep configurable for future real providers; default remains internal mock/in-app.
app.payment.provider=${APP_PAYMENT_PROVIDER:mock}
app.notification.provider=${APP_NOTIFICATION_PROVIDER:inapp}
app.notification.retention-days=${APP_NOTIFICATION_RETENTION_DAYS:7}
app.notification.cleanup-ms=${APP_NOTIFICATION_CLEANUP_MS:3600000}
app.order.pending-timeout-minutes=${APP_ORDER_PENDING_TIMEOUT_MINUTES:15}
app.order.expire-check-ms=${APP_ORDER_EXPIRE_CHECK_MS:60000}

# If you deploy behind a reverse proxy (nginx, cloud LB), consider enabling forwarded headers
# so request.getRemoteAddr() reflects the real client IP.
# server.forward-headers-strategy=framework
