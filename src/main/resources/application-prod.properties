spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

spring.thymeleaf.cache=true
spring.web.resources.cache.period=365d
spring.devtools.restart.enabled=false

# Canonical business timezone for all runtime date/time rules.
app.time-zone=${APP_TIME_ZONE:Asia/Taipei}

# Keep configurable for future real providers; default remains internal mock/in-app.
app.payment.provider=${APP_PAYMENT_PROVIDER:mock}
app.payment.allow-mode-override=${APP_PAYMENT_ALLOW_MODE_OVERRIDE:false}
app.notification.provider=${APP_NOTIFICATION_PROVIDER:inapp}
app.notification.retention-days=${APP_NOTIFICATION_RETENTION_DAYS:30}
app.notification.cleanup-ms=${APP_NOTIFICATION_CLEANUP_MS:3600000}
app.order.pending-timeout-minutes=${APP_ORDER_PENDING_TIMEOUT_MINUTES:15}
app.order.expire-check-ms=${APP_ORDER_EXPIRE_CHECK_MS:60000}
app.rate-limit.order-create-per-minute=${APP_RATE_LIMIT_ORDER_CREATE_PER_MINUTE:20}
app.rate-limit.order-pay-per-minute=${APP_RATE_LIMIT_ORDER_PAY_PER_MINUTE:30}
app.rate-limit.order-cancel-per-minute=${APP_RATE_LIMIT_ORDER_CANCEL_PER_MINUTE:20}
app.rate-limit.notification-read-per-minute=${APP_RATE_LIMIT_NOTIFICATION_READ_PER_MINUTE:60}
app.rate-limit.cleanup-ms=${APP_RATE_LIMIT_CLEANUP_MS:300000}
app.security.csrf-cookie-secure=${APP_SECURITY_CSRF_COOKIE_SECURE:true}
app.security.csrf-cookie-same-site=${APP_SECURITY_CSRF_COOKIE_SAME_SITE:Lax}

# If you deploy behind a reverse proxy (nginx, cloud LB), consider enabling forwarded headers
# so request.getRemoteAddr() reflects the real client IP.
# server.forward-headers-strategy=framework
